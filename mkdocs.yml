site_name: OllamaCode
site_description: Coding assistant using local Ollama and MCP tools
repo_url: https://github.com/jayluxferro/ollamacode
edit_uri: edit/main/docs/

theme:
  name: mkdocs

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true

nav:
  - Home: index.md
  - Wiki: WIKI.md
  - MCP Servers: MCP_SERVERS.md
  - Structured Protocol: STRUCTURED_PROTOCOL.md
  - Other Editors: OTHER_EDITORS.md
  - RLM: RLM.md
  - Toolchain Registry: TOOLCHAIN_REGISTRY.md
  - API: api.md
